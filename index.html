<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohammed Muddassir - Portfolio</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #e9ecef;
      color: #333333;
      margin: 0;
      padding: 50px 20px;
    }
    .card {
      background-color: #ffffff;
      max-width: 600px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    /* Updated CSS for the new rectangular banner image */
    img.header-pic {
      width: 100%;
      height: 250px;
      border-radius: 8px; /* Matches the curve of the card */
      object-fit: cover;
      margin-bottom: 20px;
    }
    h1 {
      margin: 10px 0 5px 0;
      color: #2c3e50;
    }
    h2 {
      margin: 0 0 20px 0;
      color: #3498db;
      font-weight: 500;
      font-size: 1.2rem;
    }
    p {
      line-height: 1.6;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Updated image tag referencing your new file -->
    <img src="image_fe89e5.jpg" alt="Construction Silhouette" class="header-pic">
    
    <h1>Mohammed Muddassir</h1>
    <h2>Civil Engineer</h2>
    <p>Welcome! I specialize in spatial data management, AutoCAD, Revit, and 3ds Max.</p>
    <p><strong>Explore my projects.</strong></p>
  </div>

</body>
</html>
