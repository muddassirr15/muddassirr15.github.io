<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohammed Muddassir - Portfolio</title>
  <style>
    /* This section controls how things look (CSS) */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #e9ecef; /* A soft light gray background */
      color: #333333;
      margin: 0;
      padding: 50px 20px;
    }
    .card {
      background-color: #ffffff; /* White background for your text */
      max-width: 600px;
      margin: 0 auto;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Adds a subtle drop shadow */
      text-align: center;
    }
    img.profile-pic {
      width: 150px;
      height: 150px;
      border-radius: 50%; /* Makes the image a circle */
      object-fit: cover;
      margin-bottom: 15px;
      border: 3px solid #3498db; /* Adds a blue ring around the photo */
    }
    h1 {
      margin: 10px 0 5px 0;
      color: #2c3e50;
    }
    h2 {
      margin: 0 0 20px 0;
      color: #3498db;
      font-weight: 500;
      font-size: 1.2rem;
    }
    p {
      line-height: 1.6;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- The image tag -->
    <img src="https://via.placeholder.com/150" alt="Mohammed Muddassir" class="profile-pic">
    
    <h1>Mohammed Muddassir</h1>
    <h2>Civil Engineer</h2>
    <p>Welcome! I specialize in spatial data management, AutoCAD, Revit, and 3ds Max.</p>
    <p><strong>Explore my projects.</strong></p>
  </div>

</body>
</html>
